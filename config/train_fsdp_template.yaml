# Documentation/template only. FSDP is intentionally disabled by default.
# Enable later only for large models that do not fit in VRAM, usually
# hidden_dim >= 1024 with T5-large/XXL or large effective batches.
architecture: mmdit_rf
objective: rectified_flow
prediction_type: flow_velocity
mode: latent
image_size: 512
latent_channels: 4
latent_downsample_factor: 8
latent_patch_size: 2

data_root: ./data/dataset/pixso_512
image_dir: images
meta_dir: ""
tags_dir: ""
out_dir: ./runs/mmdit_fsdp_template

model:
  hidden_dim: 1024
  depth: 24
  num_heads: 16
  double_stream_blocks: 16
  single_stream_blocks: 8
  gradient_checkpointing: true

text_preset: clip_l_t5_base

training:
  batch_size: 1
  grad_accum_steps: 16
  lr: 1.0e-4
  weight_decay: 0.01
  optimizer: adamw
  warmup_steps: 3000
  max_steps: 300000
  amp: true
  amp_dtype: bf16
  tf32: true
  compile: false

distributed:
  backend: accelerate
  save_on_rank0_only: true
  metrics_aggregation: true

fsdp:
  enabled: false
  min_hidden_dim: 1024
  min_num_params: 500000000
  sharding_strategy: full_shard
  auto_wrap_policy: transformer_block
  cpu_offload: false

flow:
  timestep_sampling: logit_normal
  loss_weighting: none

sampling:
  sampler: flow_heun
  steps: 28
  cfg_scale: 4.5
  shift: 3.0

vae:
  pretrained: ./vae_sd_mse
  freeze: true
  scaling_factor: 0.18215

cache:
  latent_cache: true
  text_cache: true
  auto_prepare: true
  rebuild_if_stale: false
  sharded: true
  dtype: bf16

dataset_tasks:
  txt2img: 1.0
  img2img: 0.0
  inpaint: 0.0
  control: 0.0
