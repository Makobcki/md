architecture: mmdit_rf
mode: latent
image_size: 512
latent_channels: 4
latent_downsample_factor: 8
latent_patch_size: 2

objective: rectified_flow
prediction_type: flow_velocity

# Dataset root used by smoke/tiny/dev MMDiT profiles.
data_root: ./data/dataset
image_dir: images
meta_dir: ""
tags_dir: prompts
# To train from prompt metadata instead of captions, set:
text_field: prompt
# text_fields: [prompt, caption, text]
min_tag_count: 0
out_dir: ./runs/mmdit_base
eval_prompts_file: ./data/eval_prompts/mmdit_core.txt

model:
  hidden_dim: 576
  depth: 8
  num_heads: 9
  mlp_ratio: 3.0

  qk_norm: true
  rms_norm: true
  swiglu: true
  adaln_zero: true
  pos_embed: rope_2d

  double_stream_blocks: 6
  single_stream_blocks: 2

  dropout: 0.05
  attn_dropout: 0.0
  gradient_checkpointing: false

text:
  enabled: true
  encoders:
    - name: clip_l
      model_name: openai/clip-vit-large-patch14
      max_length: 77
      trainable: false
      cache: true
    - name: t5
      model_name: google/t5-v1_1-base
      max_length: 256
      trainable: false
      cache: true
  text_dim: 1024
  pooled_dim: 1024
  empty_prompt_cache: true

conditioning:
  cfg_drop_prob: 0.15
  token_drop_prob: 0.0
  caption_drop_prob: 0.0
  tag_drop_prob: 0.0

img2img:
  enabled: true
  condition_mode: token_stream
  allow_inpainting: true
  mask_conditioning: true

training:
  batch_size: 4
  grad_accum_steps: 16
  lr: 1.0e-4
  weight_decay: 0.01
  optimizer: adamw
  warmup_steps: 1000
  max_steps: 60000
  ema_decay: 0.9999
  grad_clip_norm: 1.0
  amp: true
  amp_dtype: bf16
  tf32: true
  compile: false

inpaint:
  mask_min_area: 0.05
  mask_max_area: 0.60
  mask_modes:
    rectangle: 0.5
    brush: 0.3
    random_blocks: 0.2
  loss_mask_weight: 1.0
  loss_unmask_weight: 0.1

flow:
  timestep_sampling: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  loss_weighting: none
  train_t_min: 0.0
  train_t_max: 1.0

sampling:
  sampler: flow_heun
  steps: 28
  cfg_scale: 4.5
  shift: 3.0

eval_steps: 28
eval_cfg: 4.5

vae:
  pretrained: stabilityai/sd-vae-ft-mse
  freeze: true
  scaling_factor: 0.18215

cache:
  latent_cache: true
  text_cache: true
  auto_prepare: true
  rebuild_if_stale: false
  sharded: true
  dtype: bf16

prepare_text:
  batch_size: 8
  shard_size: 1024
  device: auto
  dtype: auto

prepare_latents:
  batch_size: 8
  num_workers: 4
  device: auto
  overwrite: false

dataset_tasks:
  txt2img: 1.0
  img2img: 0.0
  inpaint: 0.0