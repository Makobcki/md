architecture: mmdit_rf
mode: latent
image_size: 512
latent_channels: 4
latent_downsample_factor: 8
latent_patch_size: 2

objective: rectified_flow
prediction_type: flow_velocity

data_root: ./data/dataset/pixso_512
image_dir: images
meta_dir: ""
tags_dir: ""
min_tag_count: 0
out_dir: ./runs/mmdit_smoke
resume_ckpt: ./runs/mmdit_smoke/ckpt_latest.pt
eval_prompts_file: ./data/eval_prompts/mmdit_core.txt
dataset_limit: 32

model:
  hidden_dim: 64
  depth: 1
  num_heads: 4
  mlp_ratio: 2.0
  qk_norm: true
  rms_norm: true
  swiglu: true
  adaln_zero: true
  pos_embed: sincos_2d
  double_stream_blocks: 1
  single_stream_blocks: 0
  dropout: 0.0
  attn_dropout: 0.0
  gradient_checkpointing: false

text:
  enabled: true
  text_dim: 1024
  pooled_dim: 1024
  empty_prompt_cache: true
  encoders:
    - name: clip_l
      model_name: openai/clip-vit-large-patch14
      max_length: 77
      trainable: false
      cache: true
    - name: t5
      model_name: google/t5-v1_1-base
      max_length: 128
      trainable: false
      cache: true

conditioning:
  cfg_drop_prob: 0.15

training:
  batch_size: 1
  grad_accum_steps: 1
  lr: 1.0e-4
  weight_decay: 0.01
  optimizer: adamw
  warmup_steps: 1
  max_steps: 15
  log_every: 1
  save_every: 5
  val_every: 0
  val_batches: 0
  eval_every: 0
  ema_decay: 0.999
  grad_clip_norm: 1.0
  amp: false
  amp_dtype: bf16
  tf32: true
  compile: false

flow:
  timestep_sampling: uniform
  loss_weighting: none
  train_t_min: 0.0
  train_t_max: 1.0

sampling:
  sampler: flow_heun
  steps: 2
  cfg_scale: 1.0
  shift: 1.0

vae:
  pretrained: ./vae_sd_mse
  freeze: true
  scaling_factor: 0.18215

cache:
  latent_cache: true
  text_cache: true
  sharded: true
  dtype: bf16

dataset_tasks:
  txt2img: 1.0
  img2img: 0.0
  inpaint: 0.0
