architecture: mmdit_rf
mode: latent
image_size: 512
latent_channels: 4
latent_downsample_factor: 8
latent_patch_size: 2

objective: rectified_flow
prediction_type: flow_velocity

data_root: ./data_loader/raw/Danbooru
out_dir: ./runs/mmdit_overfit
eval_prompts_file: ./data/eval_prompts/mmdit_core.txt
dataset_limit: 8

model:
  hidden_dim: 256
  depth: 4
  num_heads: 4
  mlp_ratio: 2.0
  qk_norm: true
  rms_norm: true
  swiglu: true
  adaln_zero: true
  pos_embed: sincos_2d
  double_stream_blocks: 2
  single_stream_blocks: 2
  dropout: 0.0
  attn_dropout: 0.0
  gradient_checkpointing: false

text:
  enabled: true
  text_dim: 1024
  pooled_dim: 1024
  empty_prompt_cache: true
  encoders:
    - name: clip_l
      model_name: openai/clip-vit-large-patch14
      max_length: 77
      trainable: false
      cache: true
    - name: t5
      model_name: google/t5-v1_1-base
      max_length: 128
      trainable: false
      cache: true

conditioning:
  cfg_drop_prob: 0.15

training:
  batch_size: 2
  grad_accum_steps: 1
  lr: 3.0e-4
  weight_decay: 0.01
  optimizer: adamw
  warmup_steps: 20
  max_steps: 2000
  log_every: 20
  save_every: 500
  val_every: 500
  val_batches: 2
  eval_every: 0
  ema_decay: 0.999
  grad_clip_norm: 1.0
  amp: false
  amp_dtype: bf16
  tf32: true
  compile: false

flow:
  timestep_sampling: uniform
  loss_weighting: none
  train_t_min: 0.0
  train_t_max: 1.0

sampling:
  sampler: flow_heun
  steps: 16
  cfg_scale: 3.0
  shift: 1.0

vae:
  pretrained: ./vae_sd_mse
  freeze: true
  scaling_factor: 0.18215

cache:
  latent_cache: true
  text_cache: true
  sharded: true
  dtype: bf16

dataset_tasks:
  txt2img: 1.0
  img2img: 0.0
  inpaint: 0.0

sanity_overfit_steps: 2000
sanity_overfit_images: 8
sanity_overfit_max_loss: 0.05
